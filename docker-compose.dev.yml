version: '3.8'

services:
  postgres:
    ports:
      - "5432:5432"

  redis:
    ports:
      - "6379:6379"

  backend:
    environment:
      - NODE_ENV=development
    volumes:
      - ./backend/src:/usr/src/app/src
    command: npm run dev

  ai:
    environment:
      - PYTHONUNBUFFERED=1
    volumes:
      - ./ai:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload
